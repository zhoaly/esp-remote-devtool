<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LVGL Simulator - ZLYHUB</title>
    <link rel="stylesheet" href="/static/css/common.css?v=lvgl-pages-20260710">
</head>
<body>
    <div class="shell">
        <nav class="top-nav"></nav>

        <section class="hero">
            <div class="eyebrow">LVGL Simulator</div>
            <h1>Remote UI simulator.</h1>
            <div class="hero-copy">
                将 LVGL 工程构建为 WebAssembly，查看保留的构建历史，并预览任意成功生成的模拟器构建。
            </div>
            <div class="hero-grid">
                <div class="stat">
                    <div class="stat-label">远端主机</div>
                    <div class="stat-value" id="remoteHostCard"></div>
                </div>
                <div class="stat">
                    <div class="stat-label">Local Agent</div>
                    <div class="stat-value" id="localAgentCard"></div>
                </div>
                <div class="stat">
                    <div class="stat-label">LVGL 入口</div>
                    <div class="stat-value" id="lvglRemoteBaseText"></div>
                </div>
            </div>
        </section>

        <section class="panel">
            <div class="grid">
                <a class="card-link" href="/tools/lvgl/build">
                    <strong>Remote Build</strong>
                    通过 Local Agent 上传本地工程，或直接使用服务器白名单中的远端 LVGL 工作区构建。
                </a>
                <a class="card-link" href="/tools/lvgl/preview">
                    <strong>Preview</strong>
                    选择任意成功的 LVGL WebAssembly 构建，并在浏览器中查看预览。
                </a>
                <a class="card-link" href="/tools/lvgl/jobs">
                    <strong>Build History</strong>
                    查看保留的 LVGL 构建任务、日志、产物和预览链接。
                </a>
            </div>
        </section>
    </div>

    <script src="/static/js/common.js?v=lvgl-pages-20260710"></script>
</body>
</html>
