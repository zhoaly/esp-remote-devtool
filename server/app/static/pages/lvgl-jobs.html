<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LVGL Build History - ZLYHUB</title>
    <link rel="stylesheet" href="/static/css/common.css?v=lvgl-pages-20260710">
</head>
<body>
    <div class="shell">
        <nav class="top-nav"></nav>

        <section class="hero">
            <div class="eyebrow">LVGL Jobs</div>
            <h1>Build history.</h1>
            <div class="hero-copy">
                显示服务器当前保留的 LVGL 模拟器构建记录。较早记录会按配置的构建记录上限在服务器端清理。
            </div>
        </section>

        <section class="panel table-wrap">
            <div class="panel-heading">
                <h2>LVGL Build History</h2>
                <button class="secondary compact-button" type="button" onclick="loadLvglJobs()">刷新</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Job ID</th>
                        <th>状态</th>
                        <th>工程</th>
                        <th>尺寸</th>
                        <th>来源</th>
                        <th>创建时间</th>
                        <th>完成时间</th>
                        <th>链接</th>
                    </tr>
                </thead>
                <tbody id="lvglJobsBody">
                    <tr><td colspan="8">加载中...</td></tr>
                </tbody>
            </table>
        </section>
    </div>

    <script src="/static/js/common.js?v=lvgl-pages-20260710"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/lvgl-common.js?v=lvgl-pages-20260710"></script>
    <script src="/static/js/lvgl-jobs.js?v=lvgl-pages-20260710"></script>
</body>
</html>
